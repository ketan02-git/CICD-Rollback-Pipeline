name: CI-CD-Rollback-Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: demo-app
  RELEASE_NAME: demo-app
  CHART_PATH: ./demo-app

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./app
        run: npm ci

      - name: Run Tests
        working-directory: ./app
        run: npm test

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm Lint
        run: |
          helm lint ${{ env.CHART_PATH }}

      - name: Deploy with Helm (Auto Rollback Enabled)
        run: |
          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            --set image.repository=${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --atomic \
            --wait \
            --timeout 5m

      - name: Verify Helm Release
        run: |
          helm status ${{ env.RELEASE_NAME }}

      - name: Show Release History
        run: |
          helm history ${{ env.RELEASE_NAME }}

      - name: Deployment Summary
        run: |
          echo "Deployment Completed Successfully"