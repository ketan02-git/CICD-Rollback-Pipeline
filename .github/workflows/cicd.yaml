name: CI-CD-Rollback-Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: demo-app
  RELEASE_NAME: demo-app
  CHART_PATH: ./demo-app
  GIT_USER: ketan02-git
  GIT_EMAIL: ambureketan@gmail.com

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./app
        run: npm ci

      - name: Run Tests
        working-directory: ./app
        run: npm test

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-5)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update Helm values.yaml
        run: |
          yq e -i '.image.tag = strenv(GITHUB_SHA)' ${{ env.CHART_PATH }}/values.yaml

      - name: Commit and Push Updated Manifest
        run: |
          git config user.name "${{ env.GIT_USER }}"
          git config user.email "${{ env.GIT_EMAIL }}"

          git add ${{ env.CHART_PATH }}/values.yaml

          git commit -m "chore: update image tag to ${{ github.sha }}" || echo "No changes to commit"

          git push origin ${GITHUB_REF_NAME}

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm Lint
        run: |
          helm lint ${{ env.CHART_PATH }}

      - name: Deploy with Helm (Auto Rollback Enabled)
        run: |
          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            --set image.repository=${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --atomic \
            --wait \
            --timeout 5m

      - name: Verify Helm Release
        run: |
          helm status ${{ env.RELEASE_NAME }}

      - name: Show Release History
        run: |
          helm history ${{ env.RELEASE_NAME }}

      - name: Deployment Summary
        run: |
          echo "=================================="
          echo "🚀 Deployment Successful"
          echo "Image: ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Release: ${{ env.RELEASE_NAME }}"
          echo "=================================="